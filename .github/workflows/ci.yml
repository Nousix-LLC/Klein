name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: build · lint · format · test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Exercise the full supported Node range (engines: >=18.18.0).
        node-version: ["18", "20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Reproducible install from the committed lockfile (exact pinned versions).
      - name: Install
        run: npm ci

      # Mirrors the local quality gate exactly.
      - name: Build (strict type-check)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test + coverage
        run: npm run coverage
